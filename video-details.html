<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل الفيديو - Mohamed Salem | Tech</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* إعدادات لضمان توزيع العناصر بشكل سليم */
        html, body { height: 100%; margin: 0; display: flex; flex-direction: column; }
        .container { flex: 1 0 auto; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }

        /* ضبط الهيدر (المسافة بين السهم والاسم) */
        .top-nav {
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 10px 5px;
            margin-bottom: 25px;
        }

        /* الصندوق الكبير الذي يجمع عنوان المشاهدة والأزرار */
        .watch-section-box {
            background: white;
            border-radius: 25px;
            padding: 20px;
            width: 100%;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid #f0f4f8;
            text-align: center;
        }

        .watch-title {
            font-size: 18px;
            color: #0d1b3e;
            font-weight: 700;
            margin-bottom: 15px;
            display: block;
        }

        /* أزرار المشاهدة داخل الصندوق */
        .watch-buttons {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .platform-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: #fff;
            border-radius: 15px;
            text-decoration: none;
            color: #0d1b3e;
            font-weight: bold;
            border: 2px solid #e2e8f0;
            transition: 0.3s;
        }

        .footer-rights { flex-shrink: 0; padding: 20px; text-align: center; width: 100%; font-weight: 600; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
             <a href="recent-videos.html" class="back-circle" style="text-decoration:none; background:#e2e8f0; width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#0d1b3e;">
                <i class="fas fa-arrow-right"></i>
             </a>
             <span class="brand-name" style="font-size: 18px; font-weight: 700;">Mohamed Salem | Tech</span>
        </div>

        <div class="video-detail-card" style="width: 100%;">
            <div class="v-img-container" style="height: 220px;">
                <img src="https://raw.githubusercontent.com/msalem-tech/mohamedsalem-tech/refs/heads/main/IMG_%D9%A2%D9%A0%D9%A2%D9%A6%D9%A0%D9%A5%D9%A0%D9%A7_%D9%A0%D9%A2%D9%A2%D9%A7%D9%A2%D9%A7.png" class="v-actual-img">
            </div>
            <div class="v-body-content" style="padding: 20px; text-align: right;">
                <h3 style="color: #0d1b3e; font-size: 20px;">أقوى بوتات تيليجرام 😳🔥</h3>
            </div>
        </div>

        <div class="watch-section-box">
            <span class="watch-title">مشاهدة على</span>
            <div class="watch-buttons">
                <a href="https://youtube.com/@mohamedsalem-tech" target="_blank" class="platform-btn">
                    <i class="fab fa-youtube" style="color: #ff0000;"></i> YouTube
                </a>
                <a href="https://www.tiktok.com/@mohamed.salem.tec" target="_blank" class="platform-btn">
                    <i class="fab fa-tiktok" style="color: #000;"></i> TikTok
                </a>
            </div>
        </div>

        <div style="width: 100%; text-align: right; margin-bottom: 20px;">
            <h4 style="margin-bottom: 15px; color: #0d1b3e; padding-right: 5px;">الروابط الإضافية</h4>
            <div class="links-list">
                <a href="https://t.me/VjBoT" target="_blank" class="extra-link-item">
                    <div class="link-img-wrapper"><img src="https://i.postimg.cc/kGyTnM8K/IMG-20260507-003817-643.jpg" class="link-custom-img"></div>
                    <span class="link-text">بوت VJ Plus</span>
                    <i class="fas fa-chevron-left"></i>
                </a>

                <a href="https://t.me/Allsavers_bot" target="_blank" class="extra-link-item">
                    <div class="link-img-wrapper"><img src="https://i.postimg.cc/W3XWMbW7/IMG-20260507-003824-654.jpg" class="link-custom-img"></div>
                    <span class="link-text">بوت ALL SAVERS</span>
                    <i class="fas fa-chevron-left"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="footer-rights">
        © 2026 Mohamed Salem - جميع الحقوق محفوظة
    </div>
</body>
</html>
