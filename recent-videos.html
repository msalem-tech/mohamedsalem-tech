<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفيديوهات الأخيرة - Mohamed Salem Tech</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* إعدادات تمنع اختفاء العناصر فوق */
        body {
            margin: 0;
            padding: 0;
            display: block; /* إلغاء الفليكس من البودي لتجنب ضغط العناصر */
            background: linear-gradient(180deg, #f0f7ff 0%, #ffffff 100%);
        }

        .container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        /* ضبط الهيدر ليكون ظاهر وتحت شريط الحالة */
        .top-nav {
            display: flex;
            flex-direction: row-reverse;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px 0;
            margin-bottom: 20px;
        }

        .brand-name { font-weight: 700; color: #0d1b3e; }

        /* عنوان الصفحة */
        .page-main-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .page-main-title h1 {
            font-size: 24px;
            color: #0d1b3e;
            position: relative;
            display: inline-block;
            padding-bottom: 8px;
        }
        .page-main-title h1::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 4px;
            background-color: #3182ce;
            border-radius: 10px;
        }

        /* --- ضبط الكروت لتكون بالعرض (Landscape) --- */
        .v-card-modern {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .v-img-container {
            width: 100%;
            height: 200px; /* تقليل الارتفاع لتبدو مستطيلة بالعرض */
            background: #000;
        }

        .v-actual-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* لضمان ملء الصورة للمستطيل */
        }

        .v-body-content {
            padding: 15px 20px;
            text-align: right;
        }

        .v-btn-details {
            display: inline-block;
            padding: 10px 30px;
            background: #3b82f6;
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #2563eb;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.2);
        }

        /* الحقوق في الأسفل بمسافة مريحة */
        .footer-rights {
            text-align: center;
            padding: 30px 10px;
            width: 100%;
            color: #0d1b3e;
            font-weight: 600;
            opacity: 0.7;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-nav">
             <a href="index.html" class="back-circle" style="text-decoration:none; background:#e2e8f0; width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#0d1b3e;">
                <i class="fas fa-arrow-right"></i>
             </a>
             <span class="brand-name">Mohamed Salem Tech</span>
        </div>

        <div class="page-main-title">
            <h1>الفيديوهات الأخيرة</h1>
        </div>

        <div class="v-card-modern">
            <div class="v-img-container">
                <img src="https://raw.githubusercontent.com/msalem-tech/mohamedsalem-tech/refs/heads/main/IMG_%D9%A2%D9%A0%D9%A2%D9%A6%D9%A0%D9%A5%D9%A0%D9%A7_%D9%A0%D9%A2%D9%A2%D9%A7%D9%A2%D9%A7.png" class="v-actual-img">
            </div>
            <div class="v-body-content">
                <h3 style="margin:0 0 8px 0; color:#0d1b3e;">أقوى بوتات تيليجرام 😳🔥</h3>
                <p style="margin:0 0 15px 0; color:#64748b; font-size:14px;">تحميل فيديوهات مجانًا في ثواني !</p>
                <a href="video-details.html" class="v-btn-details">عرض التفاصيل</a>
            </div>
        </div>

        <div class="v-card-modern">
            <div class="v-img-container" style="background:#f1f5f9; display:flex; align-items:center; justify-content:center;">
                <i class="fas fa-video-slash" style="font-size:40px; color:#cbd5e1;"></i>
            </div>
            <div class="v-body-content">
                <h3 style="margin:0 0 8px 0; color:#0d1b3e;">قريباً..</h3>
                <p style="margin:0 0 15px 0; color:#64748b; font-size:14px;">يتم الآن تجهيز محتوى جديد.</p>
            </div>
        </div>

        <div class="footer-rights">
            © 2026 Mohamed Salem - جميع الحقوق محفوظة
        </div>
    </div>
</body>
</html>
