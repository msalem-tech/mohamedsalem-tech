<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <title>Mohamed Salem | Tech</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تأكيد مكان الحقوق في أسفل الشاشة تماماً */
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        .container {
            flex: 1 0 auto; /* بيخلي الكونتينر ياخد المساحة المتاحة ويزق الفوتر لتحت */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .footer-rights {
            flex-shrink: 0;
            padding: 20px;
            width: 100%;
            text-align: center;
            font-weight: 600;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="bg-pattern top-left"></div>
    <div class="bg-pattern bottom-right"></div>

    <div class="container">
        <div class="logo-container" style="margin-top: 20px;">
            <img src="https://raw.githubusercontent.com/msalem-tech/mohamedsalem-tech/refs/heads/main/file_00000000e9f0722fb9cc5123df4d38cf.png" class="main-logo" alt="MST Logo">
        </div>

        <h1 class="profile-name">Mohamed Salem | Tech</h1>
        <p class="tagline">شروحات برمجة، موبايلات، وكمبيوتر بطريقة بسيطة وسهلة 💻🚀</p>

        <div class="social-bar">
            <a href="https://youtube.com/@mohamedsalem-tech" target="_blank" class="btn-social btn-yt">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://www.tiktok.com/@mohamed.salem.tec" target="_blank" class="btn-social btn-tk">
                <i class="fab fa-tiktok"></i> TikTok
            </a>
            <a href="mailto:believersdailyfort@gmail.com" class="btn-social btn-em">
                <i class="fas fa-envelope"></i> Email
            </a>
        </div>

        <div class="content-card" style="margin-top: 10px;">
            <div class="title-wrapper">
                <h2 class="card-title">المحتوى</h2>
            </div>
            
            <div class="button-group">
                <a href="recent-videos.html" class="btn-large">
                    <i class="fas fa-play-circle"></i> الفيديوهات الأخيرة
                </a>
                <button class="btn-large" id="featured-btn">
                    <i class="fas fa-star"></i> الفيديوهات المميزة
                </button>
            </div>

            <div class="under-dev-box">
                🚧 الموقع تحت التطوير - سيتم إضافة محتوى قريباً
            </div>
        </div>
    </div>

    <div class="footer-rights">
        © 2026 Mohamed Salem - جميع الحقوق محفوظة
    </div>

    <script>
        document.getElementById('featured-btn').onclick = function() {
            alert('ما قولنا الموقع تحت التطوير 🙄😂');
        };
    </script>
</body>
</html>
