<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Salem | Tech</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* إعدادات الصفحة لضمان بقاء الحقوق في القاع */
        html, body { height: 100%; margin: 0; display: flex; flex-direction: column; }
        .container { flex: 1 0 auto; display: flex; flex-direction: column; align-items: center; }
        
        /* الصندوق الكبير الذي يجمع المحتوى بالكامل */
        .content-main-box {
            background: white;
            border-radius: 28px;
            padding: 30px 20px;
            width: 100%;
            max-width: 440px;
            margin-top: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 1px solid #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* تنسيق كلمة المحتوى والخط الذي تحتها */
        .title-wrapper {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .card-title {
            font-size: 22px;
            color: #0d1b3e;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
        }

        .card-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 5px;
            background-color: #3182ce;
            border-radius: 10px;
        }

        .footer-rights { 
            flex-shrink: 0; 
            padding: 20px; 
            text-align: center; 
            width: 100%; 
            font-weight: 600; 
            opacity: 0.8; 
            color: #0d1b3e;
        }
    </style>
</head>
<body>
    <div class="bg-pattern top-left"></div>
    <div class="bg-pattern bottom-right"></div>

    <div class="container">
        <div class="logo-container" style="margin-top: 20px;">
            <img src="https://raw.githubusercontent.com/msalem-tech/mohamedsalem-tech/refs/heads/main/file_00000000e9f0722fb9cc5123df4d38cf.png" class="main-logo" alt="MST Logo">
        </div>

        <h1 class="profile-name">Mohamed Salem | Tech</h1>
        
        <p class="tagline">ببسط اللي بتعلمه في البرمجة والهواتف والكمبيوتر 💻📱✨</p>

        <div class="social-bar">
            <a href="https://youtube.com/@mohamedsalem-tech" target="_blank" class="btn-social btn-yt"><i class="fab fa-youtube"></i> YouTube</a>
            <a href="https://www.tiktok.com/@mohamed.salem.tec" target="_blank" class="btn-social btn-tk"><i class="fab fa-tiktok"></i> TikTok</a>
            <a href="mailto:believersdailyfort@gmail.com" class="btn-social btn-em"><i class="fas fa-envelope"></i> Email</a>
        </div>

        <div class="content-main-box">
            <div class="title-wrapper">
                <h2 class="card-title">المحتوى</h2>
            </div>
            
            <div style="width: 100%;">
                <a href="recent-videos.html" class="btn-large"><i class="fas fa-play-circle"></i> الفيديوهات الأخيرة</a>
                <button class="btn-large" id="featured-btn"><i class="fas fa-star"></i> الفيديوهات المميزة</button>
            </div>

            <div class="under-dev-box">
                🚧 الموقع تحت التطوير - سيتم إضافة محتوى قريباً
            </div>
        </div>
    </div>

    <div class="footer-rights">
        © 2026 Mohamed Salem - جميع الحقوق محفوظة
    </div>

    <script>
        document.getElementById('featured-btn').onclick = function() {
            alert('ما قولنا الموقع تحت التطوير 🙄😂');
        };
    </script>
</body>
</html>
